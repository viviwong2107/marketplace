<!DOCTYPE html>
<html>
<head>
    <title>XMUM Marketplace Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("images/bg.jpg") no-repeat center center/cover;
            height: 100vh;
        }

        .overlay {
            background: rgba(255,255,255,0.5);
            height: 100%;
            text-align: center;
            padding-top: 50px;
        }

        /* 标题 */
        .uni {
            font-size: 42px;
            font-weight: bold;
            color: #0b2c5a;
        }

        .campus {
            font-size: 24px;
            color: #0b2c5a;
            margin-top: 5px;
        }

        .subtitle {
            margin-top: 10px;
            color: #555;
        }

    
        .login-box {
            background: white;
            width: 400px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: left;
        }

        .login-box h2 {
            color: #0b2c5a;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #0b2c5a;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #0b3d91;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #082b59;
        }

        .register {
            text-align: center;
            margin-top: 15px;
        }

        .register span {
            color: blue;
            cursor: pointer;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #082b59;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="overlay">

  
    <div class="uni">Xiamen University Malaysia</div>
    <div class="campus">Campus Second-hand Trading Marketplace</div>
    <div class="subtitle">Login with your campus email</div>

    <div class="login-box">

        <h2>Campus Email Login</h2>

        <label>Email</label>
        <input type="email" id="email" placeholder="student.id@xmu.edu.my">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">

        <button onclick="login()">Log In</button>

        <div class="register">
            Don’t have an account?
            <span onclick="register()">Register here</span>
        </div>

    </div>

</div>

<div class="footer">
    © 2026 XMUM Campus Second-hand Marketplace
</div>

<script>
function register() {
    let email = prompt("Enter your XMUM email:");
    let password = prompt("Create your password:");

    if (!email.endsWith("@xmu.edu.my")) {
        alert("Only XMUM email allowed!");
        return;
    }

    localStorage.setItem(email, password);
    alert("Registration successful!");
}

function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let savedPassword = localStorage.getItem(email);

    if (email === "" || password === "") {
        alert("Please fill in all fields!");
        return;
    }
    if (!email.endsWith("@xmu.edu.my")) {
        alert("Only XMUM email allowed!");
    } else if (savedPassword === password) {
        alert("Login successful!");
        window.location.href = "marketplace.html";
    } else {
        alert("Wrong email or password!");
    }
}
</script>

</body>
</html>
